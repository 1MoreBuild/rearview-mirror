name: Daily Content Sync

on:
  schedule:
    - cron: '0 6 * * *' # UTC 6:00 daily
  workflow_dispatch:

concurrency:
  group: content-sync-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Snapshot RSS feed
        env:
          RSS_FEED_URL: ${{ vars.RSS_FEED_URL }}
        run: |
          set -euo pipefail
          RSS_URL="${RSS_FEED_URL:-https://news.smol.ai/rss.xml}"
          curl -fsSL "$RSS_URL" -o data/raw_rss.xml
          echo "Saved RSS snapshot from $RSS_URL"

      - name: Extract new events from RSS snapshot
        run: npx tsx scripts/extract-events.ts --file data/raw_rss.xml
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Sync pelican entries from Simon tag page
        run: npx tsx scripts/sync-pelican-from-tag.ts

      - name: Commit and push synced content
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A data/ai_timeline.json data/pelican_timeline.json data/raw_rss.xml public/pelican-svgs
          if git diff --cached --quiet; then
            echo "No content changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(data): automated content sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Vercel deploy hook (optional)
        if: steps.commit.outputs.changed == 'true' && env.VERCEL_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
